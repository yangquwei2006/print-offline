<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>泓昌广告 - 系统维护中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 72px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            background: #fef3c7;
            color: #d97706;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .message {
            font-size: 16px;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .time-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }

        .time-label {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .time-value {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }

        .contact {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            color: #334155;
            margin: 8px 0;
        }

        .contact-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 20px;
        }

        .refresh-tip {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            🛠️
        </div>
        <h1>系统维护中</h1>
        <div class="badge">
            ⏸️ 暂停服务
        </div>
        <div class="message">
            尊敬的顾客：<br>
            泓昌广告自助打印系统<br>
            <strong>当前非营业时间，暂停服务</strong>
        </div>

        <div class="time-box">
            <div class="time-label">
                📅 预计恢复时间
            </div>
            <div class="time-value">
                次日 09:00
            </div>
        </div>

        <div class="contact">
            <div class="contact-item">
                📞 <a href="tel:13279567999">13279567999</a>
            </div>
            <div class="contact-item">
                📍 兴平市县门东街泓昌广告印务
            </div>
        </div>

        <div class="refresh-tip">
            🔄 恢复服务后，刷新页面即可正常使用
        </div>

        <div class="footer">
            兴平泓昌广告自助打印系统
        </div>
    </div>
</body>
</html>
